<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GDG Design Canvas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <h1>Design Canvas</h1>
        <div class="actions">
          <button data-add="rectangle">+ Rectangle</button>
          <button data-add="text">+ Text Block</button>
          <button data-add="image">+ Image Placeholder</button>
          <button id="delete-selected" class="danger">Delete Selected</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar">
          <section>
            <h2>Layers</h2>
            <ul id="layer-list"></ul>
          </section>
          <section>
            <h2>Properties</h2>
            <div id="properties-panel" class="properties-panel">Select an element</div>
          </section>
        </aside>

        <section class="canvas-frame">
          <div class="canvas-title">Editable Canvas Area</div>
          <div id="canvas" class="canvas" tabindex="0" aria-label="Design canvas"></div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
